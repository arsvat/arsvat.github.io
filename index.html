<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win VPN — Premium Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f97316; /* Рыжий цвет */
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Анимированный черно-рыжий фон */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, #442200, #000000 70%);
        }

        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 30%); }
        }

        /* Жидкое стекло */
        .liquid-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            transition: all 0.3s ease;
        }

        .liquid-card:active {
            transform: scale(0.97);
            background: rgba(249, 115, 22, 0.08);
            border-color: var(--accent);
        }

        .premium-border {
            border: 1px solid rgba(249, 115, 22, 0.4) !important;
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.1);
        }

        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(30px);
            z-index: 1000;
            padding: 2rem;
            overflow-y: auto;
        }
    </style>
</head>
<body class="p-6">

    <div class="bg-glow"></div>
    <div class="blob"></div>

    <div class="max-w-md mx-auto">
        
        <header class="text-center mb-12 mt-4">
            <div class="inline-block relative mb-4">
                <div class="absolute inset-0 bg-orange-500 blur-3xl opacity-20"></div>
                <div class="relative w-20 h-20 liquid-card flex items-center justify-center border-white/20">
                    <span class="text-4xl">🛡️</span>
                </div>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tighter italic uppercase">Win VPN</h1>
            <p class="text-orange-500/50 text-[10px] font-black tracking-[0.4em] mt-2 uppercase">Secure Access System</p>
        </header>

        <section class="space-y-4 mb-10">
            <h2 class="text-sm font-black uppercase tracking-widest text-white/40 px-2">Выберите период</h2>
            
            <div onclick="redirectToBot('1_month')" class="liquid-card p-6 flex justify-between items-center cursor-pointer">
                <div>
                    <h3 class="text-lg font-bold italic uppercase">1 Месяц</h3>
                    <p class="text-[10px] text-white/30 uppercase tracking-widest">Single Pass</p>
                </div>
                <div class="text-2xl font-black italic">100 ₽</div>
            </div>

            <div onclick="redirectToBot('3_months')" class="liquid-card p-7 flex justify-between items-center cursor-pointer premium-border relative">
                <div class="absolute -top-3 left-6 bg-orange-600 text-[9px] px-3 py-1 rounded-full font-black uppercase shadow-lg">HOT</div>
                <div>
                    <h3 class="text-lg font-bold italic uppercase text-orange-500">3 Месяца</h3>
                    <p class="text-[10px] text-orange-500/40 uppercase tracking-widest">Most Popular</p>
                </div>
                <div class="text-2xl font-black italic text-orange-500">250 ₽</div>
            </div>

            <div onclick="redirectToBot('1_year')" class="liquid-card p-6 flex justify-between items-center cursor-pointer">
                <div>
                    <h3 class="text-lg font-bold italic uppercase">1 Год</h3>
                    <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Save 50%</p>
                </div>
                <div class="text-2xl font-black italic">500 ₽</div>
            </div>
        </section>

        <div class="liquid-card p-6 mb-10">
            <h4 class="text-xs font-black uppercase tracking-widest text-white/40 mb-4">Преимущества</h4>
            <div class="space-y-3 text-xs">
                <div class="flex items-center gap-3">
                    <span class="text-orange-500">✦</span> <span>Скорость до 1 Гбит/с</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-orange-500">✦</span> <span>Ключ мгновенно в @WinVPN1_bot</span>
                </div>
            </div>
        </div>

        <footer class="text-center space-y-8 pb-10">
            <div class="flex justify-center gap-8 opacity-20 grayscale invert">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" width="40">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/Mir-logo.svg" width="40">
            </div>

            <div class="text-[9px] text-white/30 uppercase tracking-[0.3em] leading-relaxed">
                Win VPN Digital Solutions<br>
                Admin: <a href="https://t.me/arsvat2" class="text-orange-500">@arsvat2</a>
            </div>

            <div class="flex justify-center gap-6 text-[10px] font-black text-white/40 uppercase">
                <span onclick="openModal('oferta')" class="cursor-pointer underline decoration-white/10">Оферта</span>
                <span onclick="openModal('privacy')" class="cursor-pointer underline decoration-white/10">Приватность</span>
            </div>
        </footer>
    </div>

    <div id="modal">
        <button onclick="closeModal()" class="text-orange-500 font-black tracking-widest text-xs mb-10 flex items-center">
            <span class="text-xl mr-2">←</span> НАЗАД
        </button>
        <div id="modal-content" class="text-sm text-white/70 leading-relaxed space-y-4"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#000000');

        function redirectToBot(plan) {
            tg.HapticFeedback.impactOccurred('heavy');
            setTimeout(() => {
                tg.openTelegramLink('https://t.me/WinVPN1_bot?start=buy_' + plan);
            }, 150);
        }

        function openModal(type) {
            const content = {
                oferta: `
                    <h2 class="text-2xl font-black italic uppercase text-white mb-6">Публичная оферта</h2>
                    <div class="space-y-4">
                        <p><strong>1. Предмет:</strong> Услуги цифрового доступа к VPN серверам.</p>
                        <p><strong>2. Возврат (ст. 26.1 ЗоЗПП):</strong> Цифровой товар поставляется в виде ключа доступа. Согласно ст. 26.1 ЗоЗПП, возврат после получения ключа невозможен.</p>
                        <p><strong>3. Оплата:</strong> Через защищенный шлюз Lava.</p>
                    </div>`,
                privacy: `
                    <h2 class="text-2xl font-black italic uppercase text-white mb-6">Приватность</h2>
                    <p>Мы используем политику No-Logs. Ваши данные не хранятся и не передаются третьим лицам.</p>`
            };
            document.getElementById('modal-content').innerHTML = content[type];
            document.getElementById('modal').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
